<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隨機任務 | MoData</title>

    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/nav.css" />
    <link rel="stylesheet" href="/mo_data/css/quest.css" />
    <link rel="stylesheet" href="/mo_data/css/random_quest.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

  </head>
  <body>
    <div id="nav-container"></div>
    <script src="/mo_data/js/componentsLoader.js"></script>
    <br />

    <div id="searchContainer">
      <label for="searchInput" class="quick-search-label">快速搜尋</label>
      <input
        type="text"
        id="searchInput"
        placeholder="搜尋任務名稱、地區、種類、怪物..."
      />
    </div>
    <br />

    <div id="filterContainer" class="accordion">
      <h3 class="accordion-header">快速搜尋條件(可多條件搜尋)</h3>
      <div class="accordion-content">
        <div class="filter-group">
          <div class="filter-row">
            <span class="filter-label">任務地區：</span>
            <div id="areaFilterContainer" class="filter-btns"></div>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-row">
            <span class="filter-label">任務種類：</span>
            <div id="typeFilterContainer" class="filter-btns"></div>
          </div>
        </div>

        <div class="filter-actions">
          <button id="clearFiltersBtn" class="clear-btn">清除所有條件</button>
        </div>
      </div>
    </div>

    <div id="starContainer">
      <div class="no-results">
        <i class="fa-solid fa-spinner fa-spin"></i> 正在索取隨機任務內容...
      </div>
    </div>

    <button id="backToTop" title="回到頂部">▲</button>
    <script type="module" src="/mo_data/js/random_quest.js"></script>
    <div id="footer-container"></div>
  </body>
</html>
