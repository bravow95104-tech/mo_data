<style>
/* 🌟 讓 figure 本身變成 Flex 容器，圖片與文字才會絕對水平置中 */
.map-figure {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    text-align: center;
    width: 100%;
}

/* 容器相對定位，寬度緊貼圖片 */
.img-wrapper {
    position: relative;
    display: inline-block;
    max-width: 100%;
    margin: 0 auto;
}

.system-img {
    width: 100%;
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    border-radius: 6px;
}

/* 傳點標記基本樣式 */
.portal-tag {
    position: absolute;
    transform: translate(-50%, -50%); /* 🌟 讓 top/left 的點精準對齊標籤中心 */
    padding: 4px 8px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;               /* 防止文字斷行 */
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    z-index: 5;
}

/* 顏色樣式 */
.portal-tag.red { background: #e74c3c; color: white; }
.portal-tag.yellow { background: #f1c40f; color: #2c3e50; }

/* 懸停與高亮效果 (透過 mapdescription.js 動態加上 .active) */
.portal-tag:hover, .portal-tag.active {
    transform: translate(-50%, -50%) scale(1.25);
    z-index: 10;
    box-shadow: 0 0 12px 4px #2ecc71; /* 綠色強光發亮 */
}
</style>
