<h2>皇陵走法 - 傳點連動高亮</h2> 
<div class="note-text">
    💡 滑鼠移到或點擊傳點按鈕，可同步高亮對應傳點；點擊按鈕可平滑捲動至該樓層！
</div>

<!-- 皇陵前殿 -->
<figure id="floor-front" class="map-figure">
    <div class="img-wrapper">
        <img src="../pic/map/description/imperialmausoleum/皇陵前殿.jpg" class="system-img" alt="皇陵前殿">
        
        <!-- 🌟 改用 data-target-floor 替代 onclick，去掉 jumpToPortal -->
        <div class="portal-tag red" data-portal="red-1" data-target-floor="floor-mid" style="top: 35%; left: 45%;">紅1 (往中殿)</div>
        <div class="portal-tag yellow" data-portal="yellow-1" data-target-floor="floor-mid" style="top: 70%; left: 80%;">黃1 (往中殿)</div>
    </div>
    <figcaption>▲ 皇陵前殿</figcaption>
</figure>

<!-- 皇陵中殿 -->
<figure id="floor-mid" class="map-figure">
    <div class="img-wrapper">
        <img src="../pic/map/description/imperialmausoleum/皇陵中殿.jpg" class="system-img" alt="皇陵中殿">
        
        <div class="portal-tag red" data-portal="red-1" data-target-floor="floor-front" style="top: 20%; left: 15%;">紅1 (往前殿)</div>
        <div class="portal-tag yellow" data-portal="yellow-1" data-target-floor="floor-front" style="top: 60%; left: 30%;">黃1 (往前殿)</div>
    </div>
    <figcaption>▲ 皇陵中殿</figcaption>
</figure>

<!-- 皇陵迴廊 (🌟 修正 ID 為 floor-corridor) -->
<figure id="floor-corridor" class="map-figure">
    <div class="img-wrapper">
        <img src="../pic/map/description/imperialmausoleum/皇陵迴廊.jpg" class="system-img" alt="皇陵迴廊">
        
        <div class="portal-tag red" data-portal="red-2" data-target-floor="floor-mid" style="top: 20%; left: 15%;">紅2 (往中殿)</div>
        <div class="portal-tag yellow" data-portal="yellow-2" data-target-floor="floor-main" style="top: 60%; left: 30%;">黃2 (往正殿)</div>
    </div>
    <figcaption>▲ 皇陵迴廊</figcaption>
</figure>

<!-- 皇陵通道 (🌟 修正 ID 為 floor-path) -->
<figure id="floor-path" class="map-figure">
    <div class="img-wrapper">
        <img src="../pic/map/description/imperialmausoleum/皇陵通道.jpg" class="system-img" alt="皇陵通道">
        
        <div class="portal-tag red" data-portal="red-3" data-target-floor="floor-mid" style="top: 20%; left: 15%;">紅3 (往中殿)</div>
    </div>
    <figcaption>▲ 皇陵通道</figcaption>
</figure>

<!-- 皇陵正殿 (🌟 修正 ID 為 floor-main) -->
<figure id="floor-main" class="map-figure">
    <div class="img-wrapper">
        <img src="../pic/map/description/imperialmausoleum/皇陵正殿.jpg" class="system-img" alt="皇陵正殿">
        
        <div class="portal-tag yellow" data-portal="yellow-2" data-target-floor="floor-corridor" style="top: 60%; left: 30%;">黃2 (往迴廊)</div>
    </div>
    <figcaption>▲ 皇陵正殿</figcaption>
</figure>

<style>
/* 🌟 讓 figure 本身變成 Flex 容器，圖片與文字才會絕對水平置中 */
.map-figure {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    text-align: center;
    width: 100%;
}

/* 容器相對定位，寬度緊貼圖片 */
.img-wrapper {
    position: relative;
    display: inline-block;
    max-width: 100%;
    margin: 0 auto;
}

.system-img {
    width: 100%;
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    border-radius: 6px;
}

/* 傳點標記基本樣式 */
.portal-tag {
    position: absolute;
    transform: translate(-50%, -50%); /* 🌟 讓 top/left 的點精準對齊標籤中心 */
    padding: 4px 8px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;               /* 防止文字斷行 */
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    z-index: 5;
}

/* 顏色樣式 */
.portal-tag.red { background: #e74c3c; color: white; }
.portal-tag.yellow { background: #f1c40f; color: #2c3e50; }

/* 懸停與高亮效果 (透過 mapdescription.js 動態加上 .active) */
.portal-tag:hover, .portal-tag.active {
    transform: translate(-50%, -50%) scale(1.25);
    z-index: 10;
    box-shadow: 0 0 12px 4px #2ecc71; /* 綠色強光發亮 */
}
</style>
