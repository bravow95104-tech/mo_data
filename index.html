<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>MoData | 天外資料網</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="nav-container"></div>
    <script src="/mo_data/js/componentsLoader.js"></script>
<!-- 碎碎念 -->
 <!-- 網頁圖檔皆以PNG為主，未來還是得重製圖檔 -->
    <!-- 更新日誌區塊 -->
    <div id="content-wrapper">
        <section id="changelog">
          <h2>📝 更新日誌</h2>
          <ul class="changelog-list" id="changelog-list">
            <!-- 內容由 JavaScript 動態從 /data/changelog.txt 載入 -->
            <li>正在載入更新日誌...</li>
          </ul>
        </section>

        <div id="sidebar-container">
            <aside id="special-thanks" class="sidebar">
                <h2>特別感謝</h2>
                <ul class="sidebar-list">
                  <li><span class="tips">網站製作</span>霸王櫻桃鴨</li>
                  <li><span class="tips">技術指導</span>云云子</li>
                  <li><span class="tips">轉運站</span>孤傲天翔、悠希oO、張小貞、<br/>老咸</li>
                  <li><span class="tips">飛仙</span>沒事多吸貓、夏嫣乂</li>
                </ul>
            </aside>

          <!-- 天外改版資訊區塊 -->
          <aside id="release-info" class="sidebar">
            <h2>天外改版資訊</h2> 
            <ul class="sidebar-list" id="release-list">
                <!-- 內容由 JavaScript 動態從 /data/releases.txt 載入 -->
                <li>正在載入改版資訊...</li>
            </ul>
          </aside>
        </div>
    </div>
    
    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>

    <div id="footer-container"></div>

    <script>
      // 動態載入文字檔並渲染
      document.addEventListener("DOMContentLoaded", function() {
        const baseURL = "/mo_data"; // 根據你的專案路徑設定

        // 1. 載入更新日誌
        fetch(baseURL + "/data/changelog.txt")
          .then(res => res.text())
          .then(text => {
            const list = document.getElementById("changelog-list");
            const lines = text.trim().split("\n");
            list.innerHTML = "";
            
            lines.forEach(line => {
              if (!line.trim()) return;
              const li = document.createElement("li");
              
              if (line.startsWith("[Tips]")) {
                const content = line.replace("[Tips]", "").trim();
                li.innerHTML = `<span class="tips">Tips</span>${content}`;
              } else if (line.includes("|")) {
                const [date, content] = line.split("|").map(s => s.trim());
                li.innerHTML = `<span class="date">${date}</span>${content}`;
              } else {
                li.textContent = line;
              }
              list.appendChild(li);
            });
          })
          .catch(err => console.error("載入更新日誌失敗:", err));

        // 2. 載入改版資訊
        fetch(baseURL + "/data/releases.txt")
          .then(res => res.text())
          .then(text => {
            const list = document.getElementById("release-list");
            const lines = text.trim().split("\n");
            list.innerHTML = "";
            
            lines.forEach(line => {
              if (!line.trim() || !line.includes("|")) return;
              const [date, title, url] = line.split("|").map(s => s.trim());
              const li = document.createElement("li");
              li.innerHTML = `
                <span class="date">${date}</span>
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="date2">${title}</a>
              `;
              list.appendChild(li);
            });
          })
          .catch(err => console.error("載入改版資訊失敗:", err));
      });
    </script>
  </body>
</html>
