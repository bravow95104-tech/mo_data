<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>MoData | 天外資料網</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="nav-container"></div>
    <script src="/mo_data/js/componentsLoader.js"></script>
    <!-- 碎碎念 -->
    <!-- 網頁圖檔皆以PNG為主，未來還是得重製圖檔 -->
    <!-- 更新日誌區塊 -->
    <div id="content-wrapper">
      <section id="changelog">
        <h2>📝 更新日誌</h2>
        <ul class="changelog-list" id="changelog-list">
          <!-- 內容由 JavaScript 動態從 supabase_changelog 載入 -->
          <li>正在載入更新日誌...</li>
        </ul>
        <!-- 分頁按鈕 -->
        <div id="changelog-pagination" class="pagination-container"></div>
      </section>

      <div id="sidebar-container">
        <aside id="special-thanks" class="sidebar">
          <h2>特別感謝</h2>
          <ul class="sidebar-list" id="thanks-list">
            <!-- 內容由 JavaScript 動態從 supabase_thank 載入 -->
          </ul>
        </aside>

        <!-- 天外改版資訊區塊 -->
        <aside id="release-info" class="sidebar">
          <h2>天外改版資訊</h2>
          <ul class="sidebar-list" id="release-list">
            <!-- 內容由 JavaScript 動態從 supabase_release 載入 -->
            <li>正在載入改版資訊...</li>
          </ul>
        </aside>
      </div>
    </div>

    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>

    <div id="footer-container"></div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
      import { SUPABASE_URL, SUPABASE_KEY } from "./js/supabase-config.js";

      const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      // 動態載入文字檔並渲染
      document.addEventListener("DOMContentLoaded", async function () {
        const baseURL = "."; // 修正為相對路徑

        // --- 更新日誌分頁設定 ---
        const ITEMS_PER_PAGE = 25;
        let changelogLines = [];
        let currentChangelogPage = 1;

        function renderChangelog(page) {
          const list = document.getElementById("changelog-list");
          const pagination = document.getElementById("changelog-pagination");
          list.innerHTML = "";

          const start = (page - 1) * ITEMS_PER_PAGE;
          const end = start + ITEMS_PER_PAGE;
          const pageLines = changelogLines.slice(start, end);

          pageLines.forEach((item) => {
            const li = document.createElement("li");
            const safeContent = item.content
              ? String(item.content).replace(/\n/g, "<br>")
              : "";

            if (item.is_tips === "是") {
              li.innerHTML = `<span class="tips">Tips</span>${safeContent}`;
            } else {
              li.innerHTML = `<span class="date">${item.date}</span>${safeContent}`;
            }
            list.appendChild(li);
          });

          // 渲染分頁按鈕
          const totalPages = Math.ceil(changelogLines.length / ITEMS_PER_PAGE);
          if (totalPages > 1) {
            pagination.innerHTML = "";

            // 上一頁
            const prevBtn = document.createElement("button");
            prevBtn.textContent = "◀";
            prevBtn.disabled = page === 1;
            prevBtn.onclick = () => {
              currentChangelogPage--;
              renderChangelog(currentChangelogPage);
              window.scrollTo({ top: 0, behavior: "smooth" });
            };
            pagination.appendChild(prevBtn);

            // 頁碼資訊
            const pageInfo = document.createElement("span");
            pageInfo.textContent = ` 第 ${page} / ${totalPages} 頁 `;
            pageInfo.style.margin = "0 15px";
            pageInfo.style.fontWeight = "bold";
            pagination.appendChild(pageInfo);

            // 下一頁
            const nextBtn = document.createElement("button");
            nextBtn.textContent = "▶";
            nextBtn.disabled = page === totalPages;
            nextBtn.onclick = () => {
              currentChangelogPage++;
              renderChangelog(currentChangelogPage);
              window.scrollTo({ top: 0, behavior: "smooth" });
            };
            pagination.appendChild(nextBtn);
          }
        }

        // 1. 載入更新日誌 (Supabase)
        try {
          const { data, error } = await supabase
            .from("changelog")
            .select("*");

          if (error) throw error;

          // 🚀 強制前端排序：Tips 置頂，其餘按 sort_id 降冪
          changelogLines = data.sort((a, b) => {
            const aTip = a.is_tips === "是" ? 1 : 0;
            const bTip = b.is_tips === "是" ? 1 : 0;
            if (aTip !== bTip) return bTip - aTip; // Tips 優先
            return (b.sort_id || 0) - (a.sort_id || 0); // 其餘按 ID 倒序
          });

          renderChangelog(1);
        } catch (err) {
          console.error("載入更新日誌失敗:", err);
          document.getElementById("changelog-list").innerHTML =
            "<li>載入失敗。</li>";
        }

        // 2. 載入特別感謝 (Supabase)
        try {
          const { data, error } = await supabase
            .from("thanks")
            .select("*")
            .order("sort_id", { ascending: true });

          if (error) throw error;
          const list = document.getElementById("thanks-list");
          list.innerHTML = "";
          data.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = `<span class="tips">${item.category}</span>${item.names.replace(/\n/g, "<br>")}`;
            list.appendChild(li);
          });
        } catch (err) {
          console.error("載入特別感謝失敗:", err);
          document.getElementById("thanks-list").innerHTML =
            "<li>載入失敗。</li>";
        }

        // 3. 載入改版資訊 (Supabase)
        try {
          const { data, error } = await supabase
            .from("releases")
            .select("*")
            .order("sort_id", { ascending: false });

          if (error) throw error;
          const list = document.getElementById("release-list");
          list.innerHTML = "";
          data.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = `
              <span class="date">${item.date}</span>
              <a href="${item.url || "#"}" target="_blank" rel="noopener noreferrer" class="date2">${item.title}</a>
            `;
            list.appendChild(li);
          });
        } catch (err) {
          console.error("載入改版資訊失敗:", err);
          document.getElementById("release-list").innerHTML =
            "<li>載入失敗。</li>";
        }
      });
    </script>
  </body>
</html>
