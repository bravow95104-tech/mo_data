<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊戲系統 | MoData</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/nav.css" />
    <link rel="stylesheet" href="/mo_data/css/system.css" />
</head>
<body>
    <div id="nav-container"></div>
    <script src="/mo_data/js/componentsLoader.js"></script>

    <div id="content-wrapper">
        
        <aside id="system-sidebar" class="system-sidebar">
            <div class="sidebar">
                <h2>遊戲系統</h2>
                <!-- 新增搜尋框區塊 -->
        <div class="search-box-container" style="padding: 10px 0;">
            <input 
                type="text" 
                id="system-search-input" 
                placeholder="搜尋系統名稱..." 
                style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;"
            />
        </div>
                <ul class="sidebar-list" id="system-menu">
                    
                </ul>
            </div>
        </aside>

        <section id="content">
            <div id="dynamic-content">
                <div class="loading-text">正在載入系統內容...</div>
            </div>
        </section>

    </div>

    <button id="backToTop" title="回到頂部">▲</button>

    <div id="footer-container"></div>

    <script type="module" src="/mo_data/js/system.js"></script>
</body>
</html>
