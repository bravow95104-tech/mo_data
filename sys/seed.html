<h2>蟠桃種子</h2> 
<h3>官方說明</h3>
<p>連結：<a href="https://mo.lager.com.tw/Mystina/Mo_Ha_hero/newborn_herocards/index.html" target="_blank" rel="noopener noreferrer">https://mo.lager.com.tw/Mystina/Mo_Ha_hero/newborn_herocards/index.html</a></p>

<h3>取得種子</h3>
<p>可至 <strong>池底洞窟</strong> 打倒枯木精獲得「枯木精的斷枝」，並於瑤池仙境兌換：</p>
<ul>
    <li>5 根斷枝：1 級種子</li>
    <li>15 根斷枝：2 級種子</li>
    <li>30 根斷枝：3 級種子</li>
</ul>

<h3>種植條件</h3>
<ul class="note-text">
    <li>角色等級需 20 以上。</li>
    <li>每次種植費用 1 萬元 + 扣除 1000 名聲。</li>
    <li>一次僅限種植一株。</li>
    <li>需 5 天以上方可採收。</li>
</ul>
