<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英雄數值計算 | MoData</title>

    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/calculation.css" />
    <style></style>
  </head>
  <body>
    <!-- 共用導航列 -->
    <div id="nav-container"></div>
    <div class="main hero-content">
      <div class="hero-item">
        <div class="hero-card">
          <h2>英雄數值</h2>

          <div class="hero-form-col">
            <div class="search-toggle-container flex" style="justify-content: space-between; margin-bottom: 20px;">
              <div class="search-toggle-item">
                <label>搜索</label>
                <div class="switch-toggle-group">
                  <label class="switch-toggle">
                    <input type="checkbox" id="search-enable-switch" />
                    <span class="slider"></span>
                  </label>
                </div>
              </div>
              <div class="search-toggle-item">
                <label>生變</label>
                <div class="switch-toggle-group">
                  <label class="switch-toggle">
                    <input type="checkbox" id="toggle-switch" />
                    <span class="slider"></span>
                  </label>
                </div>
              </div>
            </div>

            <div class="attribute-item" style="margin-bottom: 15px;">
              <label>英雄名稱</label>
              <div class="search-row">
                <div class="search-col hero-search-col">
                  <input
                    id="searchInput4"
                    type="text"
                    class="search-input"
                    placeholder="搜尋英雄..."
                    autocomplete="off"
                    disabled
                  />
                  <div id="dropdown4" class="custom-dropdown"></div>
                </div>
              </div>
            </div>

            <!-- 屬性網格化 -->
            <div class="attributes-grid">
              <div class="attribute-item">
                <label>等級</label>
                <input type="number" id="level" class="hero-input" value="0" min="0" />
              </div>
              <div class="attribute-item">
                <label>力量</label>
                <input type="number" id="strength" class="hero-input" value="0" min="0" />
              </div>
              <div class="attribute-item">
                <label>智慧</label>
                <input type="number" id="intelligence" class="hero-input" value="0" min="0" />
              </div>
              <div class="attribute-item">
                <label>體質</label>
                <input type="number" id="constitution" class="hero-input" value="0" min="0" />
              </div>
              <div class="attribute-item">
                <label>敏捷</label>
                <input type="number" id="agility" class="hero-input" value="0" min="0" />
              </div>
              <div class="attribute-item">
                <label>運氣</label>
                <input type="number" id="luck" class="hero-input" value="0" min="0" />
              </div>
            </div>

            <!-- 裝備卡分組 -->
            <div class="equip-group-box">
              <div class="equip-group-title"><span>🛡️</span> 裝備卡 1</div>
              <div class="equip-row">
                <div class="equip-col">
                  <input type="number" id="equipment1" class="equip-input" value="0" min="0" placeholder="數值" />
                  <div class="search-row">
                    <div class="search-col">
                      <input id="searchInput1" type="text" class="search-input" placeholder="搜尋卡片..." autocomplete="off" disabled />
                      <div id="dropdown1" class="custom-dropdown"></div>
                    </div>
                  </div>
                </div>
                <div class="equip-radio-group">
                  <label><input type="radio" name="equip1-type" value="normal" checked disabled /> 非專</label>
                  <label><input type="radio" name="equip1-type" value="2x" disabled /> 2倍</label>
                  <label><input type="radio" name="equip1-type" value="2.5x" disabled /> 2.5倍</label>
                </div>
              </div>
            </div>

            <div class="equip-group-box">
              <div class="equip-group-title"><span>🛡️</span> 裝備卡 2</div>
              <div class="equip-row">
                <div class="equip-col">
                  <input type="number" id="equipment2" class="equip-input" value="0" min="0" placeholder="數值" />
                  <div class="search-row">
                    <div class="search-col">
                      <input id="searchInput2" type="text" class="search-input" placeholder="搜尋卡片..." autocomplete="off" disabled />
                      <div id="dropdown2" class="custom-dropdown"></div>
                    </div>
                  </div>
                </div>
                <div class="equip-radio-group">
                  <label><input type="radio" name="equip2-type" value="normal" checked disabled /> 非專</label>
                  <label><input type="radio" name="equip2-type" value="2x" disabled /> 2倍</label>
                  <label><input type="radio" name="equip2-type" value="2.5x" disabled /> 2.5倍</label>
                </div>
              </div>
            </div>

            <div class="equip-group-box">
              <div class="equip-group-title"><span>🛡️</span> 裝備卡 3</div>
              <div class="equip-row">
                <div class="equip-col">
                  <input type="number" id="equipment3" class="equip-input" value="0" min="0" placeholder="數值" />
                  <div class="search-row">
                    <div class="search-col">
                      <input id="searchInput3" type="text" class="search-input" placeholder="搜尋卡片..." autocomplete="off" disabled />
                      <div id="dropdown3" class="custom-dropdown"></div>
                    </div>
                  </div>
                </div>
                <div class="equip-radio-group">
                  <label><input type="radio" name="equip3-type" value="normal" checked disabled /> 非專</label>
                  <label><input type="radio" name="equip3-type" value="2x" disabled /> 2倍</label>
                  <label><input type="radio" name="equip3-type" value="2.5x" disabled /> 2.5倍</label>
                </div>
              </div>
            </div>

          </div>
          <button id="calculate-btn" class="calc-btn" type="button">
            開始計算
          </button>
        </div>
      </div>

      <div class="hero-item">
        <div class="hero-card">
          <h2>計算結果</h2>
          <div class="hero-form-col">
            <div class="attribute-item" style="background: #f8fbff; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eef5ff;">
              <label style="color: #555; font-size: 14px;">英雄 LV40 屬性點總和</label>
              <input type="number" id="total-attribute-points" class="hero-input" style="background: transparent; border: none; padding: 0; font-weight: bold; color: #267acc;" disabled />
            </div>
            
            <div class="attribute-item" style="background: #f8fbff; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eef5ff;">
              <label style="color: #555; font-size: 14px;">目前等級屬性點上限</label>
              <input type="number" id="current-level-cap" class="hero-input" style="background: transparent; border: none; padding: 0; font-weight: bold; color: #267acc;" disabled />
            </div>

            <div class="attribute-item" style="background: #f8fbff; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eef5ff;">
              <label style="color: #555; font-size: 14px;">目前等級屬性點總和</label>
              <input type="number" id="current-level-total" class="hero-input" style="background: transparent; border: none; padding: 0; font-weight: bold; color: #267acc;" disabled />
            </div>

            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #f0f7ff;">

            <div class="attribute-item result-highlight">
              <label style="color: #b8860b;">目前等級剩下可食用點數</label>
              <input type="number" id="current-level-remaining" class="hero-input result-value-big" style="background: transparent; border: none; padding: 0;" disabled />
            </div>

            <div class="attribute-item result-highlight" style="margin-top: 10px;">
              <label style="color: #b8860b;">英雄此生剩下可食用點數</label>
              <input type="number" id="hero-remaining" class="hero-input result-value-big" style="background: transparent; border: none; padding: 0;" disabled />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="/mo_data/js/componentsLoader.js"></script>

    <script src="/mo_data/js/calculation.js"></script>
  </body>
</html>
