<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>轉生裝備 | MoData</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/heroes.css" />
  </head>
  <body>
    <div id="nav-container"></div>
    <!-- 這是導航列會被載入的位置 -->

    <h1></h1>

    <!-- 搜尋框 -->
    <div id="searchContainer">
      <label for="searchInput" class="quick-search-label">快速搜尋</label>
      <input
        type="text"
        id="searchInput"
        placeholder="搜尋裝備名稱..."
      />
    </div>
    <br />
    <!-- 快速搜尋 -->
    <div id="filterContainer" class="accordion">
      <h3 class="accordion-header">快速搜尋條件(可多條件搜尋) ▾</h3>
      <div class="accordion-content">
        <div class="filter-group">
          <span class="filter-label">類型：</span>
          <button class="filter-btn" data-type="class" data-value="武器">
            武器
          </button>
          <button class="filter-btn" data-type="class" data-value="防具">
            防具
          </button>
        </div>
        <br />
        <div class="filter-group">
          <span class="filter-label">極限裝備：</span>
          <button class="filter-btn" data-type="sort" data-value="兩儀系列">
            兩儀系列
          </button>
          <button class="filter-btn" data-type="sort" data-value="總戎系列">
            總戎系列
          </button>
          <button class="filter-btn" data-type="sort" data-value="狂龍系列">
            狂龍系列
          </button>
          <button class="filter-btn" data-type="sort" data-value="撼天震地系列">
            撼天震地系列
          </button>
          <button class="filter-btn" data-type="sort" data-value="絕世無雙系列">
            絕世無雙系列
          </button>
          <button class="filter-btn" data-type="sort" data-value="光焰萬丈系列">
            光焰萬丈系列
          </button>
        </div>
        <br />
        <div class="filter-actions">
          <button id="clearFilters" class="clear-btn">清除篩選</button>
        </div>
      </div>
    </div>

    <!-- 裝備表格 -->
    <div id="hero-table-container">
      <table id="heroes-table">
        <thead>
          <tr>
            <th>圖示</th>
            <th class="sortable" data-col="name">名稱</th>
            <th class="sortable" data-col="lv">等級</th>
            <th class="sortable" data-col="atk">攻擊 / 防禦</th>
            <th class="sortable" data-col="hit">命中 / 閃避</th>
            <th  class="sortable" data-col="Durability">耐用度</th>
            <th  class="sortable" data-col="illustrate">說明</th>
          </tr>
        </thead>
        <tbody>
          <!-- 資料由 JS 動態載入 -->
        </tbody>
      </table>
    </div>
    <div id="hero-card-container"></div>

    <!-- 留白避免按鈕遮住 -->
    <div class="page-bottom-spacer"></div>

    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>



    <!-- JavaScript -->

    <div id="footer-container"></div>
    <!-- 這是頁尾會被載入的位置 -->
    <script src="/mo_data/js/rebirth_equip.js"></script>
    <script src="/mo_data/js/componentsLoader.js"></script>
  </body>
</html>
