<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>道具 | MoData</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/nav.css" />
    <link rel="stylesheet" href="/mo_data/css/weapons.css" />
    <style>
      /* 針對道具頁面優化欄位寬度 */
      #heroes-table th:nth-child(1) { width: 50px !important; }  /* 圖示欄位縮小 */
      #heroes-table th:nth-child(2) { width: 180px !important; } /* 名稱欄位縮小 */
      #heroes-table th:nth-child(3) { width: auto !important; }  /* 說明欄位自動填滿 */
      
      /* 確保圖片在欄位中正確顯示並增加圓角 */
      #heroes-table td:first-child img {
        display: block;
        margin: 0 auto;
        border-radius: 8px; /* 增加圓角 */
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>
    <!-- 這是導航列會被載入的位置 -->

    <h1></h1>

    <!-- 搜尋框 -->
    <div id="searchContainer">
      <label for="searchInput" class="quick-search-label">快速搜尋</label>
      <input type="text" id="searchInput" placeholder="搜尋名稱..." />
    </div>
    <br />
    <div class="filter-actions">
      <button id="clearFilters" class="clear-btn">清除篩選</button>
    </div>
    <br />

    <!-- 卡片容器 (手機版使用) -->
    <div id="hero-card-container"></div>

    <!-- 英雄表格 -->
    <div id="hero-table-container">
      <table id="heroes-table">
        <thead>
          <tr>
            <th style="width: 50px;">圖示</th>
            <th style="width: 120px;">名稱</th>
            <th>說明</th>
          </tr>
        </thead>
        <tbody>
          <!-- 資料由 JS 動態載入 -->
        </tbody>
      </table>
    </div>

    <!-- 留白避免按鈕遮住 -->
    <div style="height: 80px"></div>

    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>

    <!-- Modal HTML -->
    <div id="modalOverlay"></div>
    <div id="modalBox">
      <span class="close-btn">&times;</span>
      <div id="modalContent"></div>
    </div>

    <!-- JavaScript -->

    <div id="footer-container"></div>
    <!-- 這是頁尾會被載入的位置 -->
    <script type="module" src="/mo_data/js/items.js"></script>
    <script src="/mo_data/js/componentsLoader.js"></script>
  </body>
</html>
