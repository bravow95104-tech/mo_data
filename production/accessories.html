<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飾品 | MoData</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/weapons.css" />
  </head>
  <body>
    <div id="nav-container"></div>
    <!-- 這是導航列會被載入的位置 -->

    <h1></h1>

    <!-- 搜尋框 -->
    <div id="searchContainer">
      <label for="searchInput" class="quick-search-label">快速搜尋</label>
      <input
        type="text"
        id="searchInput"
        placeholder="搜尋名稱..."
      />
    </div>
    <br />
    <!-- 快速搜尋 -->
    <div id="filterContainer" class="accordion">
      <h3 class="accordion-header">快速搜尋條件 ▾</h3>
      <div class="accordion-content">
        <div class="filter-group">
          <span class="filter-label">種類：</span>
          <button class="filter-btn" data-type="promotion" data-value="頭飾">頭飾</button>
          <button class="filter-btn" data-type="promotion" data-value="眼鏡">眼鏡</button>
          <button class="filter-btn" data-type="promotion" data-value="嘴巴">嘴巴</button>
          <button class="filter-btn" data-type="promotion" data-value="座騎">座騎</button>
        </div>
        <br />
        <div class="filter-group">
          <span class="filter-label">屬性：</span>
          <button class="filter-btn" data-type="attr" data-value="力量">力量</button>
          <button class="filter-btn" data-type="attr" data-value="敏捷">敏捷</button>
          <button class="filter-btn" data-type="attr" data-value="智慧">智慧</button>
          <button class="filter-btn" data-type="attr" data-value="體質">體質</button>
          <button class="filter-btn" data-type="attr" data-value="運氣">運氣</button>
          <button class="filter-btn" data-type="attr" data-value="HP">HP</button>
          <button class="filter-btn" data-type="attr" data-value="MP">MP</button>
          <button class="filter-btn" data-type="attr" data-value="掉寶率">掉寶率</button>
          <button class="filter-btn" data-type="attr" data-value="戰鬥金幣">戰鬥金幣</button>
          <button class="filter-btn" data-type="attr" data-value="工作">工作</button>
          <button class="filter-btn" data-type="attr" data-value="攻擊力">攻擊力</button>
          <button class="filter-btn" data-type="attr" data-value="防禦力">防禦力</button>
          <button class="filter-btn" data-type="attr" data-value="閃避值">閃避值</button>
          <button class="filter-btn" data-type="attr" data-value="命中值">命中值</button>
          <button class="filter-btn" data-type="attr" data-value="遇敵機率">遇敵機率</button>
          <button class="filter-btn" data-type="attr" data-value="物理強度">物理強度</button>
          <button class="filter-btn" data-type="attr" data-value="法術強度">法術強度</button>
          <button class="filter-btn" data-type="attr" data-value="移動速度">移動速度</button>
        </div>
        <br />
        <div class="filter-group">
          <span class="filter-label">特殊：</span>
          <button class="filter-btn" data-type="attr" data-value="物理強度">物理強度</button>
          <button class="filter-btn" data-type="attr" data-value="法術強度">法術強度</button>
          <button class="filter-btn" data-type="attr" data-value="移動速度">移動速度</button>
          <button class="filter-btn" data-type="attr" data-value="物理技能傷害">物理%</button>
          <button class="filter-btn" data-type="attr" data-value="法術技能傷害">法術%</button>
          <button class="filter-btn" data-type="attr" data-value="受到技能傷害減少">受技能減傷%</button>
        </div>
        <br />
        <div class="filter-actions">
          <button id="clearFilters" class="clear-btn">清除篩選</button>
        </div>
      </div>
    </div>

    <!-- 卡片容器 (手機版使用) -->
    <div id="hero-card-container"></div>

    <!-- 英雄表格 -->
    <table id="heroes-table">
      <thead>
        <tr>
          <th>圖示</th>
          <th>名稱</th>
          <th>等級</th>
          <th>防禦力</th>
          <th>閃避值</th>
          <th>耐用度</th>
          <th>說明</th>
        </tr>
      </thead>
      <tbody>
        <!-- 資料由 JS 動態載入 -->
      </tbody>
    </table>

    <!-- 留白避免按鈕遮住 -->
    <div style="height: 80px"></div>

    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>

    <!-- Modal HTML -->
    <div id="modalOverlay"></div>
    <div id="modalBox">
      <span class="close-btn">&times;</span>
      <div id="modalContent"></div>
    </div>

    <!-- JavaScript -->

    <div id="footer-container"></div>
    <!-- 這是頁尾會被載入的位置 -->
    <script src="/mo_data/js/accessories.js"></script>
    <script src="/mo_data/js/componentsLoader.js"></script>
    
  </body>
</html>
