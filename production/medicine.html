<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>藥品 | MoData</title>
    <link rel="stylesheet" href="/mo_data/css/styles.css" />
    <link rel="stylesheet" href="/mo_data/css/nav.css" />
    <link rel="stylesheet" href="/mo_data/css/weapons.css" />
    <style>
      /* 針對藥品頁面優化欄位寬度 */
      #heroes-table {
        table-layout: auto !important; /* 讓瀏覽器根據內容自動調整寬度 */
      }
      #heroes-table th:nth-child(1) { width: 60px !important; }  /* 圖示 */
      #heroes-table th:nth-child(2) { width: 120px !important; } /* 名稱 */
      #heroes-table th:nth-child(3) { width: 60px !important; }  /* 等級 */
      
      /* 材料 1-5 與 說明 設為自動寬度，並避免文字過度換行 */
      #heroes-table th:nth-child(4),
      #heroes-table th:nth-child(5),
      #heroes-table th:nth-child(6),
      #heroes-table th:nth-child(7),
      #heroes-table th:nth-child(8) {
        width: auto !important;
        white-space: nowrap;
      }
      
      /* 說明欄位可以自動換行 */
      #heroes-table th:nth-child(9) {
        width: auto !important;
        min-width: 200px;
      }

      /* 確保圖片增加圓角 */
      #heroes-table td:first-child img {
        border-radius: 8px; /* 增加圓角 */
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>
    <!-- 這是導航列會被載入的位置 -->

    <h1></h1>

    <!-- 搜尋框 -->
    <div id="searchContainer">
      <label for="searchInput" class="quick-search-label">快速搜尋</label>
      <input type="text" id="searchInput" placeholder="搜尋名稱..." />
    </div>
    <br />
    <!-- 快速搜尋 -->
    <div id="filterContainer" class="accordion">
      <h3 class="accordion-header">快速搜尋條件(可多條件搜尋) ▾</h3>
      <div class="accordion-content">
        <div class="filter-group">
          <div class="filter-row">
            <span class="filter-label">種類：</span>
            <div class="filter-btns">
              <button class="filter-btn" data-type="promotion" data-value="角色">角色</button>
              <button class="filter-btn" data-type="promotion" data-value="英雄">英雄</button>
            </div>
          </div>
        </div>
        <div class="filter-actions">
          <button id="clearFilters" class="clear-btn">清除篩選</button>
        </div>
      </div>
    </div>

    <!-- 卡片容器 (手機版使用) -->
    <div id="hero-card-container"></div>

    <!-- 英雄表格 -->
    <div id="hero-table-container">
      <table id="heroes-table">
        <thead>
          <tr>
            <th>圖示</th>
            <th>名稱</th>
            <th>等級</th>
            <th>材料1 (個 / 組)</th>
            <th>材料2 (個 / 組)</th>
            <th>材料3 (個 / 組)</th>
            <th>材料4 (個 / 組)</th>
            <th>材料5 (個 / 組)</th>
            <th>說明</th>
          </tr>
        </thead>
        <tbody>
          <!-- 資料由 JS 動態載入 -->
        </tbody>
      </table>
    </div>

    <!-- 留白避免按鈕遮住 -->
    <div style="height: 80px"></div>

    <!-- 回到頂部按鈕 -->
    <button id="backToTop" title="回到頂部">▲</button>

    <!-- Modal HTML -->
    <div id="modalOverlay"></div>
    <div id="modalBox">
      <span class="close-btn">&times;</span>
      <div id="modalContent"></div>
    </div>

    <!-- JavaScript -->

    <div id="footer-container"></div>
    <!-- 這是頁尾會被載入的位置 -->
    <script type="module" src="/mo_data/js/medicine.js"></script>
    <script src="/mo_data/js/componentsLoader.js"></script>
  </body>
</html>
